version: "3.9"

# listing_2_9 — docker-compose.yml
# Stands up seven containers: gateway, three domain services,
# Postgres, Redis, and Kafka.  Redis and Kafka are wired now
# but unused until later chapters add AI-native components.

services:

  gateway:
    build: ../gateway
    ports: ["8080:8080"]
    environment:
      - CATALOG_URL=http://catalog:8001
      - CHECKOUT_URL=http://checkout:8002
      - ORDERS_URL=http://orders:8003
      - GEMINI_API_KEY=${GEMINI_API_KEY}          # inherited now; used later
    depends_on: [catalog, checkout, orders]

  catalog:
    build: ../catalog
    environment:
      - DATABASE_URL=postgresql://app:app@postgres:5432/catalog
    depends_on: [postgres]

  checkout:
    build: ../checkout
    environment:
      - DATABASE_URL=postgresql://app:app@postgres:5432/checkout
    depends_on: [postgres]

  orders:
    build: ../orders
    environment:
      - DATABASE_URL=postgresql://app:app@postgres:5432/orders
    depends_on: [postgres]

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine                         # reserved for caching layer

  kafka:
    image: bitnami/kafka:3.7                      # KRaft mode — no Zookeeper
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

volumes:
  pgdata:
