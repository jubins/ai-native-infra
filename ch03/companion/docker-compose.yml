services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    volumes:
      - ./catalog/db_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  catalog:
    build:
      context: ./catalog
    environment:
      DATABASE_URL: postgresql://catalog:catalog@postgres:5432/catalog
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
