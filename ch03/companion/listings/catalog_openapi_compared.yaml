# Listing 3.3 — catalog_openapi_compared.yaml: the same endpoint, declared loosely and completely

# Loose declaration: sufficient for a human reader; no longer sufficient
# when the reader is an agent.
paths:
  /catalog/search:
    get:
      summary: Search the catalog
      parameters:
        - name: q
          in: query
          schema: { type: string }          # A — no constraints, no operationId, no error shapes

---

# Complete declaration: every field constrained, every status documented.
paths:
  /catalog/search:
    get:
      operationId: searchCatalog            # B — stable identifier for tool selection
      summary: Search the product catalog by free-text query.
      description: |                        # C — semantic intent + what it does NOT do
        Returns products whose name matches the supplied query string.
        Matching is performed against the product name field; matching
        against description is not supported in this release.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 200
            example: jacket
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Matching products, ordered by relevance.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
        '422':                              # D — every documented status has a schema
          description: The query parameter was missing or malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
      components:
        schemas:
          Product:
            type: object
            required: [id, name, price_cents]
            properties:
              id:
                type: string
                pattern: '^p_[0-9]+$'      # E — regex replaces pattern inference
                example: p_001
              name: { type: string, example: Merino Wool Jacket }
              price_cents:
                type: integer
                minimum: 0
                description: Price in integer cents, to avoid floating-point error.
